<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scary Maze Game</title>

<style>
body {
    text-align: center;
    font-family: Arial;
}

/* MAZE */
#maze {
    position: relative;
    width: 520px;
    height: 420px;
    margin: auto;
    background-color: red;
}

/* ONE CONTINUOUS SAFE PATH (NOT SEPARATE BLOCKS) */
#path {
    position: absolute;
    width: 450px;
    height: 40px;
    top: 180px;
    left: 70px;
    background-color: white;
}

/* vertical section */
#path2 {
    position: absolute;
    width: 40px;
    height: 200px;
    top: 120px;
    left: 480px;
    background-color: white;
}

/* second horizontal */
#path3 {
    position: absolute;
    width: 300px;
    height: 40px;
    top: 320px;
    left: 180px;
    background-color: white;
}

/* START */
#start {
    position: absolute;
    width: 70px;
    height: 40px;
    background-color: yellow;
    border: 2px solid black;
    font-weight: bold;
    line-height: 40px;
    top: 180px;
    left: 0;
    z-index: 10;
}

/* END */
#end {
    position: absolute;
    width: 70px;
    height: 40px;
    background-color: yellow;
    border: 2px solid black;
    font-weight: bold;
    line-height: 40px;
    top: 320px;
    left: 480px;
    z-index: 10;
}

/* SCARY IMAGE */
#scare {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    z-index: 999;
}
</style>
</head>

<body>

<h1>Scary Maze Game</h1>
<p>Move from START to END without touching red.</p>

<div id="maze">

    <div id="start">START</div>

    <!-- ONE CONNECTED PATH SYSTEM -->
    <div id="path"></div>
    <div id="path2"></div>
    <div id="path3"></div>

    <div id="end">END</div>

</div>

<img id="scare" src="scare.jpg">
<audio id="scream" src="scream.mp3"></audio>

<script>
let started = false;

const start = document.getElementById("start");
const end = document.getElementById("end");
const scare = document.getElementById("scare");
const scream = document.getElementById("scream");

/* START */
start.addEventListener("mouseover", () => {
    started = true;
});

/* LOSE (anything NOT white path or start/end) */
document.addEventListener("mouseover", (e) => {
    if (!started) return;

    const safe = ["start", "end"];
    const isPath = (e.target.id === "path" ||
                    e.target.id === "path2" ||
                    e.target.id === "path3");

    if (!safe.includes(e.target.id) && !isPath) {
        alert("You lost!");
        started = false;
    }
});

/* WIN */
end.addEventListener("mouseover", () => {
    if (started) {
        scare.style.display = "block";
        scream.play();
    }
});
</script>

</body>
</html>
