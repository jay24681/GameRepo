<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scary Maze Game</title>

<style>
body {
    text-align: center;
    font-family: Arial;
}

/* GAME AREA */
#maze {
    position: relative;
    width: 500px;
    height: 400px;
    margin: auto;
    background-color: red; /* walls */
}

/* SAFE PATH */
.path {
    position: absolute;
    background-color: white;
}

/* COMPLEX MAZE PATH */
#p1 { width: 80px; height: 40px; top: 180px; left: 90px; }
#p2 { width: 40px; height: 140px; top: 100px; left: 170px; }
#p3 { width: 180px; height: 40px; top: 100px; left: 210px; }
#p4 { width: 40px; height: 160px; top: 100px; left: 390px; }
#p5 { width: 160px; height: 40px; top: 260px; left: 230px; }
#p6 { width: 40px; height: 120px; top: 260px; left: 190px; }
#p7 { width: 140px; height: 40px; top: 320px; left: 40px; }

/* START + END */
#start, #end {
    position: absolute;
    width: 70px;
    height: 40px;
    background-color: yellow;
    color: black;
    font-weight: bold;
    text-align: center;
    line-height: 40px;
    border: 2px solid black;
    z-index: 9999;
    cursor: pointer;
}

#start { top: 180px; left: 0; }
#end { top: 320px; left: 140px; }

/* SCARY IMAGE */
#scare {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    z-index: 999;
}
</style>
</head>

<body>

<h1>Scary Maze Game</h1>
<p>Move from START to END without touching red walls.</p>

<div id="maze">

    <div id="start">START</div>

    <!-- Maze path -->
    <div class="path" id="p1"></div>
    <div class="path" id="p2"></div>
    <div class="path" id="p3"></div>
    <div class="path" id="p4"></div>
    <div class="path" id="p5"></div>
    <div class="path" id="p6"></div>
    <div class="path" id="p7"></div>

    <div id="end">END</div>

</div>

<img id="scare" src="scare.jpg">
<audio id="scream" src="scream.mp3"></audio>

<script>
let started = false;

const start = document.getElementById("start");
const end = document.getElementById("end");
const scare = document.getElementById("scare");
const scream = document.getElementById("scream");

/* START GAME */
start.addEventListener("mouseover", () => {
    started = true;
});

/* LOSE CONDITION */
document.addEventListener("mouseover", (e) => {
    if (!started) return;

    const safe = ["start", "end"];
    const isPath = e.target.classList.contains("path");

    if (!safe.includes(e.target.id) && !isPath) {
        alert("You lost!");
        started = false;
    }
});

/* WIN CONDITION */
end.addEventListener("mouseover", () => {
    if (started) {
        scare.style.display = "block";
        scream.play();
    }
});
</script>

</body>
</html>
