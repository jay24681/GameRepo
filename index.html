<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scary Maze Game</title>

<style>
body {
    text-align: center;
    font-family: Arial;
}

/* MAZE AREA */
#maze {
    position: relative;
    width: 520px;
    height: 420px;
    margin: auto;
    background-color: red; /* walls */
}

/* SAFE PATH */
.path {
    position: absolute;
    background-color: white;
}

/* =========================
   FIXED MAZE LAYOUT
   (NO GAP AT START)
   ========================= */

/* FIRST PATH TOUCHES START DIRECTLY */
#p1 {
    width: 120px;
    height: 40px;
    top: 180px;
    left: 70px; /* IMPORTANT: touches START exactly */
}

#p2 { width: 40px; height: 140px; top: 120px; left: 190px; }
#p3 { width: 220px; height: 40px; top: 120px; left: 230px; }
#p4 { width: 40px; height: 180px; top: 120px; left: 450px; }
#p5 { width: 220px; height: 40px; top: 300px; left: 230px; }
#p6 { width: 40px; height: 120px; top: 300px; left: 190px; }
#p7 { width: 180px; height: 40px; top: 360px; left: 40px; }

/* START (NOW CONNECTED TO PATH) */
#start {
    position: absolute;
    width: 70px;
    height: 40px;
    background-color: yellow;
    border: 2px solid black;
    font-weight: bold;
    line-height: 40px;
    top: 180px;
    left: 0;
    z-index: 10;
}

/* END (properly aligned to final path) */
#end {
    position: absolute;
    width: 70px;
    height: 40px;
    background-color: yellow;
    border: 2px solid black;
    font-weight: bold;
    line-height: 40px;
    top: 360px;
    left: 190px;
    z-index: 10;
}

/* SCARY IMAGE */
#scare {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    z-index: 999;
}
</style>
</head>

<body>

<h1>Scary Maze Game</h1>
<p>Move from START to END without touching red walls.</p>

<div id="maze">

    <div id="start">START</div>

    <div class="path" id="p1"></div>
    <div class="path" id="p2"></div>
    <div class="path" id="p3"></div>
    <div class="path" id="p4"></div>
    <div class="path" id="p5"></div>
    <div class="path" id="p6"></div>
    <div class="path" id="p7"></div>

    <div id="end">END</div>

</div>

<img id="scare" src="scare.jpg">
<audio id="scream" src="scream.mp3"></audio>

<script>
let started = false;

const start = document.getElementById("start");
const end = document.getElementById("end");
const scare = document.getElementById("scare");
const scream = document.getElementById("scream");

/* START GAME */
start.addEventListener("mouseover", () => {
    started = true;
});

/* LOSE CONDITION */
document.addEventListener("mouseover", (e) => {
    if (!started) return;

    const safe = ["start", "end"];
    const isPath = e.target.classList.contains("path");

    if (!safe.includes(e.target.id) && !isPath) {
        alert("You lost!");
        started = false;
    }
});

/* WIN CONDITION */
end.addEventListener("mouseover", () => {
    if (started) {
        scare.style.display = "block";
        scream.play();
    }
});
</script>

</body>
</html>
