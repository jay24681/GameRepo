<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scary Maze Game</title>

<style>
body {
    text-align: center;
    font-family: Arial;
}

/* Maze container */
#maze {
    position: relative;
    width: 600px;
    height: 500px;
    margin: auto;
    background-color: red; /* walls */
}

/* Safe white path pieces */
.path {
    position: absolute;
    background-color: white;
}

/* More complex turning maze path */

/* Start horizontal */
#p1 {
    width: 150px;
    height: 40px;
    top: 220px;
    left: 70px;
}

/* Up */
#p2 {
    width: 40px;
    height: 160px;
    top: 100px;
    left: 180px;
}

/* Right */
#p3 {
    width: 220px;
    height: 40px;
    top: 100px;
    left: 180px;
}

/* Down */
#p4 {
    width: 40px;
    height: 180px;
    top: 100px;
    left: 360px;
}

/* Left */
#p5 {
    width: 180px;
    height: 40px;
    top: 240px;
    left: 220px;
}

/* Down again */
#p6 {
    width: 40px;
    height: 160px;
    top: 240px;
    left: 220px;
}

/* Right to finish */
#p7 {
    width: 250px;
    height: 40px;
    top: 360px;
    left: 220px;
}

/* End vertical connection */
#p8 {
    width: 40px;
    height: 80px;
    top: 360px;
    left: 470px;
}

/* START */
#start {
    position: absolute;
    width: 70px;
    height: 40px;
    background-color: yellow;
    border: 2px solid black;
    font-weight: bold;
    line-height: 40px;
    top: 220px;
    left: 0;
    z-index: 10;
    cursor: pointer;
}

/* END */
#end {
    position: absolute;
    width: 70px;
    height: 40px;
    background-color: yellow;
    border: 2px solid black;
    font-weight: bold;
    line-height: 40px;
    top: 400px;
    left: 510px;
    z-index: 10;
    cursor: pointer;
}

/* Jumpscare image */
#scare {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    z-index: 999;
}
</style>
</head>

<body>

<h1>Scary Maze Game</h1>
<p>Move from START to END without touching red walls.</p>

<div id="maze">

    <div id="start">START</div>

    <!-- Turning maze path -->
    <div class="path" id="p1"></div>
    <div class="path" id="p2"></div>
    <div class="path" id="p3"></div>
    <div class="path" id="p4"></div>
    <div class="path" id="p5"></div>
    <div class="path" id="p6"></div>
    <div class="path" id="p7"></div>
    <div class="path" id="p8"></div>

    <div id="end">END</div>

</div>

<img id="scare" src="scare.jpg">
<audio id="scream" src="scream.mp3"></audio>

<script>
let started = false;

const start = document.getElementById("start");
const end = document.getElementById("end");
const scare = document.getElementById("scare");
const scream = document.getElementById("scream");

/* Start game */
start.addEventListener("mouseover", () => {
    started = true;
});

/* Lose condition */
document.addEventListener("mouseover", (e) => {
    if (!started) return;

    const safeZones = ["start", "end"];
    const isPath = e.target.classList.contains("path");

    if (!safeZones.includes(e.target.id) && !isPath) {
        alert("You lost!");
        started = false;
    }
});

/* Win condition */
end.addEventListener("mouseover", () => {
    if (started) {
        scare.style.display = "block";
        scream.play();
    }
});
</script>

</body>
</html>
