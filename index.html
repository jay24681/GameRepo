<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scary Maze Game - Multiple Levels</title>

<style>
body {
    text-align: center;
    font-family: Arial;
}

h1 {
    margin-bottom: 10px;
}

#levelText {
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 15px;
}

#maze {
    position: relative;
    width: 700px;
    height: 500px;
    margin: auto;
    background-color: red;
}

.path {
    position: absolute;
    background-color: white;
}

#start, #end {
    position: absolute;
    width: 70px;
    height: 40px;
    background-color: yellow;
    border: 2px solid black;
    font-weight: bold;
    text-align: center;
    line-height: 40px;
    z-index: 10;
    cursor: pointer;
}

#scare {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    z-index: 999;
}
</style>
</head>

<body>

<h1>Scary Maze Game</h1>
<div id="levelText">Level 1</div>
<p>Reach END without touching the red walls.</p>

<div id="maze">
    <div id="start">START</div>
    <div id="end">END</div>
</div>

<img id="scare" src="scare.jpg">
<audio id="scream" src="scream.mp3"></audio>

<script>
let started = false;
let currentLevel = 1;

const maze = document.getElementById("maze");
const start = document.getElementById("start");
const end = document.getElementById("end");
const scare = document.getElementById("scare");
const scream = document.getElementById("scream");
const levelText = document.getElementById("levelText");

/* ---------- HELPERS ---------- */

function clearPaths() {
    document.querySelectorAll(".path").forEach(path => path.remove());
}

function createPath(width, height, top, left) {
    const div = document.createElement("div");
    div.classList.add("path");

    div.style.width = width + "px";
    div.style.height = height + "px";
    div.style.top = top + "px";
    div.style.left = left + "px";

    maze.appendChild(div);
}

/* ---------- LOAD LEVEL ---------- */

function loadLevel(level) {
    clearPaths();
    started = false;
    currentLevel = level;

    if (level === 1) {
        levelText.textContent = "Level 1";

        start.style.top = "220px";
        start.style.left = "0px";

        end.style.top = "380px";
        end.style.left = "560px";

        createPath(150, 40, 220, 70);
        createPath(40, 160, 100, 180);
        createPath(220, 40, 100, 180);
        createPath(40, 180, 100, 360);
        createPath(220, 40, 240, 360);
        createPath(40, 180, 240, 540);
        createPath(100, 40, 380, 460);
    }

    if (level === 2) {
        levelText.textContent = "Level 2";

        start.style.top = "80px";
        start.style.left = "0px";

        end.style.top = "420px";
        end.style.left = "600px";

        createPath(200, 40, 80, 70);
        createPath(40, 250, 80, 230);
        createPath(300, 40, 290, 230);
        createPath(40, 170, 290, 490);
        createPath(150, 40, 420, 490);
    }
}

/* ---------- START GAME ---------- */

start.addEventListener("mouseover", () => {
    started = true;
});

/* ---------- LOSE CONDITION ---------- */

document.addEventListener("mouseover", (e) => {
    if (!started) return;

    const safeZones = ["start", "end"];
    const isPath = e.target.classList.contains("path");

    if (!safeZones.includes(e.target.id) && !isPath) {
        alert("You lost! Restarting level.");
        loadLevel(currentLevel);
    }
});

/* ---------- WIN CONDITION ---------- */

end.addEventListener("mouseover", () => {
    if (!started) return;

    started = false;

    if (currentLevel === 1) {
        alert("Level 1 Complete! Loading Level 2...");
        loadLevel(2);
        return;
    }

    if (currentLevel === 2) {
        scare.style.display = "block";
        scream.play();
    }
});

/* ---------- START FIRST LEVEL ---------- */

loadLevel(1);
</script>

</body>
</html>
