<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scary Maze Game</title>

<style>
body {
    text-align: center;
    font-family: Arial;
}

#maze {
    position: relative;
    width: 500px;
    height: 400px;
    margin: auto;
    background-color: red; /* walls */
}

/* Maze path pieces */
.path {
    position: absolute;
    background-color: white;
}

/* Individual segments */
#p1 { width: 80px; height: 40px; top: 180px; left: 0; }
#p2 { width: 40px; height: 120px; top: 100px; left: 80px; }
#p3 { width: 200px; height: 40px; top: 100px; left: 120px; }
#p4 { width: 40px; height: 150px; top: 100px; left: 320px; }
#p5 { width: 180px; height: 40px; top: 250px; left: 180px; }
#p6 { width: 40px; height: 120px; top: 250px; left: 140px; }
#p7 { width: 120px; height: 40px; top: 330px; left: 20px; }

/* Start and End */
#start, #end {
    position: absolute;
    width: 60px;
    height: 40px;
    background-color: green;
    color: white;
    line-height: 40px;
    font-weight: bold;
    text-align: center;
}

#start { top: 180px; left: 0; }
#end { top: 330px; left: 140px; }

/* Scare */
#scare {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    z-index: 999;
}
</style>
</head>

<body>

<h1>Scary Maze Game</h1>
<p>Navigate carefully... don't touch the walls.</p>

<div id="maze">
    <div id="start">START</div>

    <!-- Maze path -->
    <div class="path" id="p1"></div>
    <div class="path" id="p2"></div>
    <div class="path" id="p3"></div>
    <div class="path" id="p4"></div>
    <div class="path" id="p5"></div>
    <div class="path" id="p6"></div>
    <div class="path" id="p7"></div>

    <div id="end">END</div>
</div>

<img id="scare" src="scare.jpg">
<audio id="scream" src="scream.mp3"></audio>

<script>
let started = false;

const start = document.getElementById("start");
const end = document.getElementById("end");
const scare = document.getElementById("scare");
const scream = document.getElementById("scream");

// Start game
start.addEventListener("mouseover", () => {
    started = true;
});

// Lose condition
document.addEventListener("mouseover", (e) => {
    if (!started) return;

    // Allowed areas
    if (
        e.target.id !== "start" &&
        e.target.id !== "end" &&
        !e.target.classList.contains("path")
    ) {
        alert("You lost!");
        started = false;
    }
});

// Win
end.addEventListener("mouseover", () => {
    if (started) {
        scare.style.display = "block";
        scream.play();
    }
});
</script>

</body>
</html>
